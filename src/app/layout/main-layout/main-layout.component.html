<div class="layout">
  <aside class="layout__sidebar">
    <app-logo variant="full" theme="light" class="layout__logo" />

    <nav class="layout__nav">
      <a class="layout__nav-link" routerLink="/home" routerLinkActive="layout__nav-link--active">Início</a>
      <a class="layout__nav-link" routerLink="/vagas" routerLinkActive="layout__nav-link--active">Vagas</a>
    </nav>
  </aside>

  <div class="layout__main">
    <header class="layout__topbar">
      <div class="layout__user">
        <p-avatar [label]="initials" shape="circle" />
        @if (username) {
          <span class="layout__username">{{ username }}</span>
        }
        <p-button label="Sair" icon="pi pi-sign-out" [text]="true" (onClick)="logout()" />
      </div>
    </header>

    <main class="layout__content">
      <router-outlet />
    </main>
  </div>
</div>
